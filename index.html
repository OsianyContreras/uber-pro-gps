<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uber to Sygic PRO</title>
    <!-- Cargamos Tesseract desde un mirror más compatible con Safari -->
    <script src="https://unpkg.com/tesseract.js@v5.0.3/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            min-height: 100vh; 
            overflow: hidden; 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-card { 
            backdrop-filter: blur(30px); 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .spinner { 
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top: 3px solid #3b82f6; 
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Area especial para Safari: Input invisible que ocupa todo el botón */
        .safari-hack {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            z-index: 20;
            cursor: pointer;
        }

        .pulse {
            animation: pulse-blue 2s infinite;
        }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 bg-gradient-to-b from-gray-900 to-black">

    <header class="text-center mb-8">
        <div class="inline-block px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 mb-3">
            <span class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em]">Sygic Bridge v3.0</span>
        </div>
        <h1 class="text-3xl font-black tracking-tighter italic bg-gradient-to-r from-white to-gray-500 bg-clip-text text-transparent">UBER NAVIGATOR</h1>
    </header>

    <main class="w-full max-w-sm relative">
        <div id="mainBox" class="ios-card rounded-[2.5rem] p-8 text-center transition-all duration-500">
            
            <!-- ESTADO 1: INICIO -->
            <div id="idleState" class="space-y-6">
                <div class="relative w-20 h-20 mx-auto">
                    <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20 animate-pulse"></div>
                    <div class="relative bg-blue-600 rounded-2xl w-full h-full flex items-center justify-center shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                    </div>
                </div>

                <div class="space-y-2">
                    <h2 class="text-xl font-bold">Pegar Captura</h2>
                    <p class="text-gray-500 text-xs">Toca el botón y selecciona <b>"Pegar"</b> cuando aparezca el menú de Safari.</p>
                </div>

                <div class="relative h-16 w-full">
                    <!-- El botón visual -->
                    <div class="absolute inset-0 bg-blue-600 rounded-2xl flex items-center justify-center font-bold text-lg pulse">
                        PEGAR AHORA
                    </div>
                    <!-- El "Hack" para Safari: Un div editable invisible -->
                    <div id="pasteArea" contenteditable="true" class="safari-hack" role="textbox"></div>
                </div>
            </div>

            <!-- ESTADO 2: PROCESANDO -->
            <div id="processingState" class="hidden py-8 space-y-6">
                <div class="spinner mx-auto"></div>
                <div class="space-y-1">
                    <p class="text-blue-400 font-bold tracking-widest animate-pulse uppercase text-sm">Escaneando...</p>
                    <p class="text-gray-500 text-[10px]">Tesseract está leyendo la imagen</p>
                </div>
            </div>

            <!-- ESTADO 3: ÉXITO -->
            <div id="successState" class="hidden py-4 space-y-6">
                <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-2xl p-4">
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mb-1">Destino Detectado</p>
                    <p id="coordsDisplay" class="text-2xl font-mono text-white tracking-tighter"></p>
                </div>
                <button onclick="launchSygic()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-emerald-900/40 active:scale-95 transition-all uppercase">
                    ABRIR EN SYGIC
                </button>
            </div>
        </div>
    </main>

    <footer class="mt-10 opacity-30">
        <p class="text-[9px] uppercase tracking-[0.3em]">GitHub Pages Secured</p>
    </footer>

    <script>
        let lat = "", lon = "";
        const pasteArea = document.getElementById('pasteArea');
        const idleState = document.getElementById('idleState');
        const processingState = document.getElementById('processingState');
        const successState = document.getElementById('successState');
        const coordsDisplay = document.getElementById('coordsDisplay');

        // Función para enfocar el área de pegado
        pasteArea.addEventListener('click', () => {
            pasteArea.focus();
        });

        // Evento principal de pegado
        pasteArea.addEventListener('paste', (e) => {
            e.preventDefault();
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            let imageFound = false;

            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    processImage(blob);
                    imageFound = true;
                    break;
                }
            }
            
            if (!imageFound) {
                alert("No se detectó una imagen. Asegúrate de copiar la captura de pantalla antes.");
            }
        });

        async function processImage(file) {
            idleState.classList.add('hidden');
            processingState.classList.remove('hidden');

            try {
                // Inicializar Tesseract con configuración para Safari
                const worker = await Tesseract.createWorker('eng');
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789.,- '
                });
                
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();

                // Regex mejorada para coordenadas
                const regex = /(-?\d+\.\d+)\s*[,|\s]\s*(-?\d+\.\d+)/;
                const match = text.match(regex);

                if (match) {
                    lat = match[1];
                    lon = match[2];
                    coordsDisplay.innerText = `${lat}, ${lon}`;
                    processingState.classList.add('hidden');
                    successState.classList.remove('hidden');
                    
                    if (navigator.vibrate) navigator.vibrate([20, 50, 20]);
                    
                    // Auto-lanzamiento opcional tras 1 segundo
                    setTimeout(launchSygic, 1000);
                } else {
                    alert("No se encontraron números que parezcan coordenadas. Intenta otra captura.");
                    location.reload();
                }
            } catch (err) {
                alert("Error técnico: " + err.message);
                location.reload();
            }
        }

        function launchSygic() {
            if (!lat || !lon) return;
            const url = `com.sygic.aura://coordinate|${lon}|${lat}|drive`;
            window.location.replace(url);
            
            // Si después de 3 segundos no ha cambiado de app, avisar
            setTimeout(() => {
                if (!document.hidden) {
                    alert("Sygic no abrió. ¿Está instalada la app?");
                }
            }, 3000);
        }

        // Forzar el foco al cargar para ayudar a Safari
        window.onload = () => {
            setTimeout(() => { pasteArea.focus(); }, 500);
        };
    </script>
</body>
</html>
