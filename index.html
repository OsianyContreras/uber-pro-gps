<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uber to Sygic PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Campo de texto real para que iOS muestre el menú Pegar */
        #pasteInput {
            background: #2563eb;
            color: white;
            border-radius: 1.5rem;
            width: 100%;
            height: 80px;
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            border: none;
            outline: none;
            -webkit-appearance: none;
        }
        #pasteInput:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5);
        }
        .spinner { 
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6; 
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 bg-gradient-to-b from-gray-900 to-black">

    <header class="text-center mb-10 mt-4">
        <h1 class="text-3xl font-black italic bg-gradient-to-r from-white to-gray-500 bg-clip-text text-transparent uppercase tracking-tighter">Uber Navigator</h1>
        <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-1">Sygic Bridge v4.0</p>
    </header>

    <main class="flex-1 flex flex-col items-center justify-start space-y-8 w-full max-w-sm mx-auto">
        
        <!-- ESTADO INICIAL -->
        <div id="idleState" class="w-full space-y-6">
            <div class="bg-white/5 border border-white/10 rounded-[2.5rem] p-8 text-center">
                <p class="text-gray-400 text-sm mb-6">Copia la captura de pantalla en tu Galería y luego:</p>
                
                <!-- MÉTODO 1: PEGAR (EL MÁS RÁPIDO) -->
                <div class="space-y-3">
                    <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Opción A: Pegar</p>
                    <input type="text" id="pasteInput" placeholder="TOCA AQUÍ Y PEGA" readonly>
                </div>

                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                    <div class="relative flex justify-center text-[10px] uppercase"><span class="bg-black px-2 text-gray-600 font-bold">o también</span></div>
                </div>

                <!-- MÉTODO 2: SUBIR ARCHIVO (EL MÁS SEGURO) -->
                <div class="space-y-3">
                    <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Opción B: Seleccionar</p>
                    <label for="fileInput" class="block w-full bg-white/10 hover:bg-white/20 text-white py-4 rounded-2xl font-bold transition-all cursor-pointer">
                        SELECCIONAR FOTO
                    </label>
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                </div>
            </div>
        </div>

        <!-- ESTADO PROCESANDO -->
        <div id="processingState" class="hidden text-center py-12">
            <div class="spinner mx-auto mb-6"></div>
            <p class="text-blue-400 font-black animate-pulse text-lg uppercase italic">Leyendo captura...</p>
            <p id="progressTxt" class="text-gray-500 text-xs mt-2 tracking-widest">0%</p>
        </div>

        <!-- ESTADO ÉXITO -->
        <div id="successState" class="hidden w-full space-y-4">
            <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-3xl p-6 text-center">
                <p class="text-xs text-emerald-400 font-bold uppercase mb-2">Destino Encontrado</p>
                <p id="coordsDisplay" class="text-3xl font-mono text-white tracking-tighter"></p>
            </div>
            <button onclick="launchSygic()" class="w-full bg-emerald-600 text-white py-6 rounded-3xl font-black text-2xl shadow-2xl active:scale-95 transition-transform uppercase italic">
                Abrir Sygic
            </button>
        </div>

    </main>

    <script>
        const pasteInput = document.getElementById('pasteInput');
        const fileInput = document.getElementById('fileInput');
        const idleState = document.getElementById('idleState');
        const processingState = document.getElementById('processingState');
        const successState = document.getElementById('successState');
        const coordsDisplay = document.getElementById('coordsDisplay');
        const progressTxt = document.getElementById('progressTxt');
        
        let lat = "", lon = "";

        // Al tocar el input, forzamos que sea editable un momento para que iOS de la opción de pegar
        pasteInput.addEventListener('click', () => {
            pasteInput.readOnly = false;
            pasteInput.focus();
            // Lo volvemos a poner readonly para que no se abra el teclado de letras, solo el menú de Pegar
            setTimeout(() => { pasteInput.readOnly = true; }, 100);
        });

        // Captura de pegado
        pasteInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const item = Array.from((e.clipboardData || e.originalEvent.clipboardData).items).find(x => x.type.indexOf('image') !== -1);
            if (item) processImage(item.getAsFile());
            else alert("No hay una imagen en el portapapeles. Copia la foto primero.");
        });

        // Captura de archivo directo
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) processImage(e.target.files[0]);
        });

        async function processImage(file) {
            idleState.style.display = 'none';
            processingState.style.display = 'block';

            try {
                const worker = await Tesseract.createWorker('eng', 1, {
                    workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/worker.min.js',
                    corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5.0.3/tesseract-core.wasm.js',
                    logger: m => {
                        if(m.status === 'recognizing text') progressTxt.innerText = `${Math.round(m.progress * 100)}%`;
                    }
                });

                await worker.setParameters({ tessedit_char_whitelist: '0123456789.,- ' });
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();

                const match = text.match(/(-?\d+\.\d+)\s*[,|\s]\s*(-?\d+\.\d+)/);
                if (match) {
                    lat = match[1]; lon = match[2];
                    coordsDisplay.innerText = `${lat}, ${lon}`;
                    processingState.style.display = 'none';
                    successState.style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate([40, 100, 40]);
                    setTimeout(launchSygic, 500);
                } else {
                    alert("No leí coordenadas. Asegúrate de que los números se vean claros.");
                    location.reload();
                }
            } catch (err) {
                alert("Error: " + err.message);
                location.reload();
            }
        }

        function launchSygic() {
            if (lat && lon) window.location.replace(`com.sygic.aura://coordinate|${lon}|${lat}|drive`);
        }
    </script>
</body>
</html>
