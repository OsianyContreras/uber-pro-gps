<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uber to Sygic PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #pasteInput {
            background: #2563eb;
            color: white;
            border-radius: 1.5rem;
            width: 100%;
            height: 80px;
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            border: none;
            outline: none;
            -webkit-appearance: none;
        }
        .spinner { 
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6; 
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Overlay para capturar el primer toque necesario en iOS */
        #interactionOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: transparent;
        }
    </style>
</head>
<body class="p-6 bg-gradient-to-b from-gray-900 to-black">

    <!-- Este overlay captura el toque obligatorio que pide Safari para leer el clipboard -->
    <div id="interactionOverlay"></div>

    <header class="text-center mb-10 mt-4">
        <h1 class="text-3xl font-black italic bg-gradient-to-r from-white to-gray-500 bg-clip-text text-transparent uppercase tracking-tighter">Uber Navigator</h1>
        <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-1">Sygic Bridge v5.1 AUTO-FIX</p>
    </header>

    <main class="flex-1 flex flex-col items-center justify-start space-y-8 w-full max-w-sm mx-auto relative z-10">
        
        <!-- ESTADO INICIAL -->
        <div id="idleState" class="w-full space-y-6">
            <div class="bg-white/5 border border-white/10 rounded-[2.5rem] p-8 text-center">
                <p id="mainInstruction" class="text-blue-400 font-bold text-sm mb-6 animate-pulse uppercase italic">Toca cualquier parte para iniciar</p>
                
                <div class="space-y-3">
                    <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">O pega manualmente aquí:</p>
                    <input type="text" id="pasteInput" placeholder="PEGAR CAPTURA" readonly>
                </div>

                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                    <div class="relative flex justify-center text-[10px] uppercase"><span class="bg-black px-2 text-gray-600 font-bold">o</span></div>
                </div>

                <div class="space-y-3">
                    <label for="fileInput" class="block w-full bg-white/10 text-white py-4 rounded-2xl font-bold transition-all cursor-pointer text-xs uppercase">
                        Seleccionar de la Galería
                    </label>
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                </div>
            </div>
        </div>

        <!-- ESTADO PROCESANDO -->
        <div id="processingState" class="hidden text-center py-12">
            <div class="spinner mx-auto mb-6"></div>
            <p class="text-blue-400 font-black animate-pulse text-lg uppercase italic">Procesando...</p>
            <p id="progressTxt" class="text-gray-500 text-xs mt-2 tracking-widest">ESPERE UN MOMENTO</p>
        </div>

        <!-- ESTADO ÉXITO -->
        <div id="successState" class="hidden w-full space-y-4">
            <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-3xl p-6 text-center">
                <p class="text-xs text-emerald-400 font-bold uppercase mb-2">Coordenadas Listas</p>
                <p id="coordsDisplay" class="text-3xl font-mono text-white tracking-tighter"></p>
            </div>
            <button onclick="launchSygic()" class="w-full bg-emerald-600 text-white py-6 rounded-3xl font-black text-2xl shadow-2xl active:scale-95 transition-transform uppercase italic">
                Navegar ahora
            </button>
        </div>

    </main>

    <script>
        const pasteInput = document.getElementById('pasteInput');
        const fileInput = document.getElementById('fileInput');
        const idleState = document.getElementById('idleState');
        const processingState = document.getElementById('processingState');
        const successState = document.getElementById('successState');
        const coordsDisplay = document.getElementById('coordsDisplay');
        const progressTxt = document.getElementById('progressTxt');
        const mainInstruction = document.getElementById('mainInstruction');
        const interactionOverlay = document.getElementById('interactionOverlay');
        
        let lat = "", lon = "";

        // Función para leer el portapapeles tras una interacción del usuario
        async function tryAutoPaste() {
            try {
                const clipboardItems = await navigator.clipboard.read();
                for (const item of clipboardItems) {
                    for (const type of item.types) {
                        if (type.startsWith('image/')) {
                            const blob = await item.getType(type);
                            processImage(blob);
                            interactionOverlay.style.display = 'none';
                            return true;
                        }
                    }
                }
            } catch (err) {
                console.error("Error al leer clipboard:", err);
            }
            return false;
        }

        // En iOS, el primer toque desbloquea el permiso de lectura del portapapeles
        interactionOverlay.addEventListener('click', async () => {
            mainInstruction.innerText = "Buscando captura...";
            const success = await tryAutoPaste();
            if (!success) {
                mainInstruction.innerText = "Copia la foto y toca de nuevo";
            } else {
                interactionOverlay.style.display = 'none';
            }
        });

        // Fallback manual
        pasteInput.addEventListener('click', () => {
            pasteInput.readOnly = false;
            pasteInput.focus();
            setTimeout(() => { pasteInput.readOnly = true; }, 100);
        });

        pasteInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const item = Array.from((e.clipboardData || e.originalEvent.clipboardData).items).find(x => x.type.indexOf('image') !== -1);
            if (item) {
                interactionOverlay.style.display = 'none';
                processImage(item.getAsFile());
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                interactionOverlay.style.display = 'none';
                processImage(e.target.files[0]);
            }
        });

        async function processImage(file) {
            idleState.style.display = 'none';
            processingState.style.display = 'block';

            try {
                const worker = await Tesseract.createWorker('eng', 1, {
                    workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/worker.min.js',
                    corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5.0.3/tesseract-core.wasm.js',
                    logger: m => {
                        if(m.status === 'recognizing text') progressTxt.innerText = `${Math.round(m.progress * 100)}%`;
                    }
                });

                await worker.setParameters({ tessedit_char_whitelist: '0123456789.,- ' });
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();

                const match = text.match(/(-?\d+\.\d+)\s*[,|\s]\s*(-?\d+\.\d+)/);
                if (match) {
                    lat = match[1]; lon = match[2];
                    coordsDisplay.innerText = `${lat}, ${lon}`;
                    processingState.style.display = 'none';
                    successState.style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate([40, 100, 40]);
                    
                    setTimeout(launchSygic, 800);
                } else {
                    alert("No se detectaron coordenadas en la imagen.");
                    location.reload();
                }
            } catch (err) {
                alert("Error de procesamiento. Reintenta.");
                location.reload();
            }
        }

        function launchSygic() {
            if (lat && lon) window.location.replace(`com.sygic.aura://coordinate|${lon}|${lat}|drive`);
        }
    </script>
</body>
</html>
