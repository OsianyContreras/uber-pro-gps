<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uber to Sygic PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; min-height: 100vh; overflow: hidden; touch-action: manipulation; }
        .ios-card { backdrop-filter: blur(25px); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); }
        .spinner { border-top-color: #3b82f6; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Input invisible pero con tamaño para forzar el menú de pegar */
        #pasteHelper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .attention-pulse {
            animation: attention 2s infinite;
        }
        @keyframes attention {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); transform: scale(1); }
            50% { transform: scale(1.02); }
            70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); transform: scale(1); }
        }
    </style>
</head>
<body class="flex flex-col items-center p-6 space-y-10">

    <!-- Elemento para forzar el foco y el evento paste -->
    <div id="pasteTarget" contenteditable="true" style="position:fixed; top:-100px; left:0; opacity:0;"></div>

    <header class="text-center pt-12">
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 uppercase tracking-tighter italic">Sygic Auto-Link</h1>
        <p class="text-gray-500 text-[10px] mt-2 uppercase tracking-[0.3em]">Corrección de Activación</p>
    </header>

    <main class="w-full max-w-sm space-y-6 text-center">
        <div id="mainBox" class="ios-card rounded-[3rem] p-10 shadow-2xl relative">
            
            <!-- Estado 1: Esperando -->
            <div id="idleState" class="space-y-6">
                <div class="w-20 h-20 bg-blue-500/10 rounded-full mx-auto flex items-center justify-center border border-blue-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-xl font-bold uppercase tracking-tight">Captura Lista</h2>
                    <p id="statusText" class="text-gray-400 text-xs mt-2">1. Toca el botón azul.<br>2. Selecciona <b>"Pegar"</b> cuando aparezca.</p>
                </div>
                
                <button id="triggerBtn" class="w-full bg-blue-600 text-white py-6 rounded-2xl font-black text-lg shadow-lg attention-pulse uppercase transition-all active:scale-95">
                    ACTIVAR PEGADO
                </button>
            </div>

            <!-- Estado 2: Procesando -->
            <div id="processingState" class="hidden py-6 space-y-6">
                <div class="spinner w-16 h-16 border-4 border-white/10 rounded-full mx-auto"></div>
                <p class="text-blue-400 font-black tracking-widest animate-pulse uppercase">Analizando Imagen...</p>
            </div>

            <!-- Estado 3: Éxito -->
            <div id="successState" class="hidden py-4 space-y-8">
                <div class="space-y-1">
                    <p class="text-[10px] text-emerald-400 font-bold tracking-[0.2em] uppercase">Coordenadas OK</p>
                    <p id="coordsDisplay" class="text-2xl font-mono text-white"></p>
                </div>
                <button onclick="launchSygic()" class="w-full bg-gradient-to-tr from-emerald-400 to-green-600 py-6 rounded-[2rem] font-black text-xl shadow-lg active:scale-95 transition-all uppercase">
                    ABRIR SYGIC
                </button>
            </div>
        </div>

        <button onclick="document.getElementById('fileInput').click()" class="text-gray-600 text-[10px] uppercase tracking-widest opacity-40">
            Usar archivo manualmente
        </button>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
    </main>

    <script>
        let lat = "", lon = "";
        const triggerBtn = document.getElementById('triggerBtn');
        const pasteTarget = document.getElementById('pasteTarget');
        const idleState = document.getElementById('idleState');
        const processingState = document.getElementById('processingState');
        const successState = document.getElementById('successState');
        const coordsDisplay = document.getElementById('coordsDisplay');

        // Al tocar el botón, forzamos el foco en un elemento editable
        // Esto hace que iOS muestre la opción de "Pegar"
        triggerBtn.addEventListener('click', () => {
            pasteTarget.focus();
            // Intentamos ejecutar el comando nativo
            document.execCommand('paste');
        });

        // Capturamos el evento de pegado en el documento
        document.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            let imageFound = false;

            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    processImage(blob);
                    imageFound = true;
                    break;
                }
            }
            
            if (!imageFound) {
                alert("No se encontró una imagen en el portapapeles. Asegúrate de que el Atajo copió la captura.");
            }
        });

        async function processImage(file) {
            idleState.classList.add('hidden');
            processingState.classList.remove('hidden');

            try {
                const worker = await Tesseract.createWorker('eng');
                await worker.setParameters({ tessedit_char_whitelist: '0123456789.,- ' });
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();

                const regex = /(-?\d+\.\d+)\s*[,|\s]\s*(-?\d+\.\d+)/;
                const match = text.match(regex);

                if (match) {
                    lat = match[1]; lon = match[2];
                    coordsDisplay.innerText = `${lat}, ${lon}`;
                    processingState.classList.add('hidden');
                    successState.classList.remove('hidden');
                    if (navigator.vibrate) navigator.vibrate(50);
                } else {
                    alert("No se detectaron coordenadas legibles. Asegúrate de que la captura no sea borrosa.");
                    resetUI();
                }
            } catch (err) {
                alert("Error de procesamiento: " + err.message);
                resetUI();
            }
        }

        function launchSygic() {
            window.location.href = `com.sygic.aura://coordinate|${lon}|${lat}|drive`;
            setTimeout(resetUI, 3000);
        }

        function resetUI() {
            idleState.classList.remove('hidden');
            processingState.classList.add('hidden');
            successState.classList.add('hidden');
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files[0]) processImage(e.target.files[0]);
        });
    </script>
</body>
</html>
